<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>버전 2: 모던 미니멀리즘</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/version2.css">
</head>
<body>
    <div style="padding: 120px 0; background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);">
        <div style="max-width: 1200px; margin: 0 auto; padding: 0 20px;">
            <div style="text-align: center; margin-bottom: 80px;">
                <div style="display: inline-block; padding: 10px 28px; background: linear-gradient(135deg, rgba(30, 64, 175, 0.08) 0%, rgba(59, 130, 246, 0.12) 100%); color: #1e40af; font-size: 13px; font-weight: 700; letter-spacing: 3px; border-radius: 50px; margin-bottom: 24px; border: 1px solid rgba(30, 64, 175, 0.15);">
                    SAFE MANAGEMENT
                </div>
                <h2 style="font-size: 52px; font-weight: 900; color: #0f172a; margin-bottom: 24px; letter-spacing: -0.03em;">
                    안심 관리 서비스
                </h2>
                <p style="font-size: 20px; color: #64748b; font-weight: 400; line-height: 1.7; max-width: 600px; margin: 0 auto;">
                    담당 컨설턴트가 직접 매장을 방문하여<br>접수부터 도와드립니다.
                </p>
            </div>
            
            <!-- Modern Minimalist Cards -->
            <div class="modern-grid">
                <!-- Card 1 -->
                <div class="modern-card">
                    <div class="modern-card-top">
                        <div class="icon-circle">
                            <i class="fas fa-calendar-alt"></i>
                        </div>
                    </div>
                    <div class="modern-card-body">
                        <h3>지원기간</h3>
                        <div class="vertical-line"></div>
                        <div class="info-row">
                            <div class="info-label">운영 기간</div>
                            <div class="info-value">2026년 예산 소진 시까지</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">접수 방식</div>
                            <div class="info-value status-badge">선착순 마감</div>
                        </div>
                    </div>
                    <div class="card-footer">
                        <i class="fas fa-arrow-right"></i>
                    </div>
                </div>
                
                <!-- Card 2 -->
                <div class="modern-card">
                    <div class="modern-card-top">
                        <div class="icon-circle">
                            <i class="fas fa-user-friends"></i>
                        </div>
                    </div>
                    <div class="modern-card-body">
                        <h3>지원대상</h3>
                        <div class="vertical-line"></div>
                        <div class="info-row">
                            <div class="info-label">대상자</div>
                            <div class="info-value">폐업 예정 소상공인</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">필수 조건</div>
                            <div class="info-value">사업자등록 보유</div>
                        </div>
                    </div>
                    <div class="card-footer">
                        <i class="fas fa-arrow-right"></i>
                    </div>
                </div>
                
                <!-- Card 3 -->
                <div class="modern-card">
                    <div class="modern-card-top">
                        <div class="icon-circle">
                            <i class="fas fa-map-marker-alt"></i>
                        </div>
                    </div>
                    <div class="modern-card-body">
                        <h3>대상지역</h3>
                        <div class="vertical-line"></div>
                        <div class="info-row">
                            <div class="info-label">담당 구역</div>
                            <div class="info-value">컨설턴트 담당 구역 내</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">지원 지역</div>
                            <div class="info-value region-tag">대전 · 세종 · 충청</div>
                        </div>
                    </div>
                    <div class="card-footer">
                        <i class="fas fa-arrow-right"></i>
                    </div>
                </div>
            </div>
            
            <!-- Info Banner -->
            <div class="info-banner">
                <div class="banner-left">
                    <div class="banner-icon">
                        <i class="fas fa-info-circle"></i>
                    </div>
                    <div class="banner-text">
                        <strong>지역별 책임 담당제 운영</strong>
                        <span>담당 구역 외 지역은 상담이 제한될 수 있습니다.</span>
                    </div>
                </div>
                <div class="banner-right">
                    <button class="consult-btn">
                        <i class="fas fa-comments"></i>
                        무료 상담 신청
                    </button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
