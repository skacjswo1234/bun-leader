<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>버전 3: 프리미엄 글래스모피즘</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/version3.css">
</head>
<body>
    <div class="glass-section">
        <div class="animated-bg">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
        </div>
        
        <div style="max-width: 1300px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 10;">
            <div style="text-align: center; margin-bottom: 80px;">
                <div class="premium-badge">
                    <i class="fas fa-star"></i>
                    PREMIUM SERVICE
                </div>
                <h2 class="glass-title">
                    안심 관리 서비스
                </h2>
                <p class="glass-subtitle">
                    담당 컨설턴트가 직접 매장을 방문하여 접수부터 도와드립니다.
                </p>
            </div>
            
            <!-- Glass Cards Container -->
            <div class="glass-container">
                <!-- Card 1 -->
                <div class="glass-card">
                    <div class="glass-card-glow"></div>
                    <div class="glass-card-inner">
                        <div class="card-header-section">
                            <div class="icon-glass">
                                <div class="icon-inner">
                                    <i class="fas fa-calendar-check"></i>
                                </div>
                            </div>
                            <div class="card-badge">01</div>
                        </div>
                        
                        <div class="card-content-section">
                            <h3 class="card-title">지원기간</h3>
                            
                            <div class="detail-box">
                                <div class="detail-item">
                                    <span class="detail-icon"><i class="fas fa-clock"></i></span>
                                    <div class="detail-text">
                                        <div class="detail-label">운영기간</div>
                                        <div class="detail-value">2026년 예산 소진 시까지</div>
                                    </div>
                                </div>
                                
                                <div class="detail-item highlight">
                                    <span class="detail-icon"><i class="fas fa-bolt"></i></span>
                                    <div class="detail-text">
                                        <div class="detail-label">접수방식</div>
                                        <div class="detail-value emphasis">선착순 마감</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Card 2 -->
                <div class="glass-card">
                    <div class="glass-card-glow"></div>
                    <div class="glass-card-inner">
                        <div class="card-header-section">
                            <div class="icon-glass">
                                <div class="icon-inner">
                                    <i class="fas fa-user-shield"></i>
                                </div>
                            </div>
                            <div class="card-badge">02</div>
                        </div>
                        
                        <div class="card-content-section">
                            <h3 class="card-title">지원대상</h3>
                            
                            <div class="detail-box">
                                <div class="detail-item">
                                    <span class="detail-icon"><i class="fas fa-user-tie"></i></span>
                                    <div class="detail-text">
                                        <div class="detail-label">대상자</div>
                                        <div class="detail-value">폐업 예정 소상공인</div>
                                    </div>
                                </div>
                                
                                <div class="detail-item">
                                    <span class="detail-icon"><i class="fas fa-check-circle"></i></span>
                                    <div class="detail-text">
                                        <div class="detail-label">필수조건</div>
                                        <div class="detail-value">사업자등록 보유</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Card 3 -->
                <div class="glass-card">
                    <div class="glass-card-glow"></div>
                    <div class="glass-card-inner">
                        <div class="card-header-section">
                            <div class="icon-glass">
                                <div class="icon-inner">
                                    <i class="fas fa-map-marked-alt"></i>
                                </div>
                            </div>
                            <div class="card-badge">03</div>
                        </div>
                        
                        <div class="card-content-section">
                            <h3 class="card-title">대상지역</h3>
                            
                            <div class="detail-box">
                                <div class="detail-item">
                                    <span class="detail-icon"><i class="fas fa-map-pin"></i></span>
                                    <div class="detail-text">
                                        <div class="detail-label">담당구역</div>
                                        <div class="detail-value">컨설턴트 담당 구역 내</div>
                                    </div>
                                </div>
                                
                                <div class="detail-item highlight">
                                    <span class="detail-icon"><i class="fas fa-location-dot"></i></span>
                                    <div class="detail-text">
                                        <div class="detail-label">지원지역</div>
                                        <div class="detail-value region">대전 · 세종 · 충청</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Premium Notice Box -->
            <div class="premium-notice-box">
                <div class="notice-glow"></div>
                <div class="notice-content">
                    <div class="notice-left">
                        <div class="notice-icon-wrapper">
                            <i class="fas fa-shield-check"></i>
                        </div>
                        <div class="notice-text-wrapper">
                            <h4>지역별 책임 담당제 운영</h4>
                            <p>담당 구역 외 지역은 상담이 제한될 수 있습니다.</p>
                        </div>
                    </div>
                    <div class="notice-right">
                        <button class="premium-cta-btn">
                            <span>무료 상담 신청</span>
                            <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
