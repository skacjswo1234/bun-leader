<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>버전 1: 럭셔리 카드 스타일</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/version1.css">
</head>
<body>
    <div style="padding: 80px 0; background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);">
        <div style="max-width: 1400px; margin: 0 auto; padding: 0 20px;">
            <div style="text-align: center; margin-bottom: 80px;">
                <div style="display: inline-block; padding: 12px 32px; background: rgba(255, 255, 255, 0.15); border: 2px solid rgba(255, 255, 255, 0.3); border-radius: 50px; color: white; font-size: 13px; font-weight: 700; letter-spacing: 3px; margin-bottom: 24px; backdrop-filter: blur(10px);">
                    SAFE MANAGEMENT SERVICE
                </div>
                <h2 style="font-size: 56px; font-weight: 900; color: white; margin-bottom: 24px; letter-spacing: -0.02em;">
                    안심 관리 서비스
                </h2>
                <p style="font-size: 22px; color: rgba(255, 255, 255, 0.9); font-weight: 300; line-height: 1.7;">
                    담당 컨설턴트가 직접 매장을 방문하여 접수부터 도와드립니다.
                </p>
            </div>
            
            <!-- Luxury Cards Grid -->
            <div class="luxury-cards-grid">
                <!-- Card 1 -->
                <div class="luxury-card">
                    <div class="luxury-card-inner">
                        <div class="luxury-card-header">
                            <div class="luxury-icon-wrapper">
                                <i class="fas fa-calendar-check"></i>
                            </div>
                            <div class="luxury-number">01</div>
                        </div>
                        <div class="luxury-card-content">
                            <h3>지원기간</h3>
                            <div class="luxury-divider"></div>
                            <p class="main-text">2026년 예산 소진 시까지</p>
                            <p class="sub-text"><span class="highlight-badge">선착순 마감</span></p>
                            <div class="luxury-pattern"></div>
                        </div>
                    </div>
                </div>
                
                <!-- Card 2 -->
                <div class="luxury-card">
                    <div class="luxury-card-inner">
                        <div class="luxury-card-header">
                            <div class="luxury-icon-wrapper">
                                <i class="fas fa-user-tie"></i>
                            </div>
                            <div class="luxury-number">02</div>
                        </div>
                        <div class="luxury-card-content">
                            <h3>지원대상</h3>
                            <div class="luxury-divider"></div>
                            <p class="main-text">폐업 예정 소상공인</p>
                            <p class="sub-text">사업자등록 보유 필수</p>
                            <div class="luxury-pattern"></div>
                        </div>
                    </div>
                </div>
                
                <!-- Card 3 -->
                <div class="luxury-card">
                    <div class="luxury-card-inner">
                        <div class="luxury-card-header">
                            <div class="luxury-icon-wrapper">
                                <i class="fas fa-map-marked-alt"></i>
                            </div>
                            <div class="luxury-number">03</div>
                        </div>
                        <div class="luxury-card-content">
                            <h3>대상지역</h3>
                            <div class="luxury-divider"></div>
                            <p class="main-text">컨설턴트 담당 구역</p>
                            <p class="sub-text"><span class="region-badge">대전 · 세종 · 충청</span></p>
                            <div class="luxury-pattern"></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Bottom Notice -->
            <div class="luxury-notice">
                <div class="notice-icon">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <div class="notice-content">
                    <strong>지역별 책임 담당제 운영</strong>
                    <p>담당 구역 외 지역은 상담이 제한될 수 있습니다.</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
