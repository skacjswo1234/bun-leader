# Cloudflare Pages Functions 설정
# Pages Functions는 자동으로 functions/ 폴더를 인식합니다
# pages_build_output_dir은 Pages Functions에서는 필요 없습니다 (자동 감지)

name = "bun-leader"
compatibility_date = "2024-01-01"

# D1 데이터베이스 바인딩
# Pages 대시보드에서 환경 변수로 설정하거나
# wrangler pages deploy 시 --d1=BINDING_NAME=database_id 형식으로 설정

[[d1_databases]]
binding = "DB"
database_name = "bun-leader-db"
database_id = "YOUR_DATABASE_ID"  # Cloudflare D1에서 생성 후 ID 입력

# Pages는 functions/ 폴더를 자동으로 인식하므로
# 별도의 라우트 설정이 필요 없습니다
#
# 분양파트너 일괄 문자(솔라피)
# Pages에 이 wrangler.toml이 연결되면, 대시보드의 **일반 텍스트** 변수만으로는
# Functions(env)에 값이 안 들어가는 경우가 있습니다. (대시보드에 안내 배너가 뜸)
# → SOLAPI_API_KEY / SOLAPI_API_SECRET / SOLAPI_FROM 은 모두 **Encrypt(Secret)** 로 등록하거나,
#   `npx wrangler pages secret put SOLAPI_API_KEY` 처럼 CLI로 Secret 등록 후 재배포.
# 발신번호 (솔라피 등록 번호와 일치해야 함, 숫자만)
[vars]
SOLAPI_FROM = "01029312966"
